services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    volumes:
      - db-data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/mahjong.db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
